<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 影片工作流測試 🎬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --ink: #2C3345;
    --ink-soft: #5A6478;
    --ink-muted: #8A93A6;
    --border: #E5E8EF;
    --brand: #2D5BFF;
    --brand-soft: #EEF2FF;
    --accent: #00B894;
    --warning: #FFB020;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(20, 25, 40, 0.04), 0 8px 24px rgba(20, 25, 40, 0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: saturate(180%) blur(8px);
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    color: var(--ink);
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2D5BFF, #6E8BFF);
    display: grid;
    place-items: center;
    color: white;
    font-size: 14px;
    font-weight: 700;
  }

  .topbar-meta {
    color: var(--ink-muted);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }

  main {
    padding: 40px 0 80px;
  }

  .hero {
    margin-bottom: 28px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--brand-soft);
    color: var(--brand);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
    letter-spacing: 0.02em;
    margin-bottom: 16px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--brand);
    border-radius: 50%;
  }

  h1 {
    font-size: 32px;
    line-height: 1.25;
    margin: 0 0 12px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .subtitle {
    color: var(--ink-soft);
    font-size: 16px;
    margin: 0;
    max-width: 720px;
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--ink-muted);
  }

  .meta-row span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .meta-row strong {
    color: var(--ink-soft);
    font-weight: 500;
  }

  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }

  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .video-footer {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: var(--ink-muted);
    border-top: 1px solid var(--border);
    background: #FAFBFD;
  }

  .video-footer a {
    color: var(--brand);
    text-decoration: none;
    font-weight: 500;
  }

  .video-footer a:hover {
    text-decoration: underline;
  }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    margin-top: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .card h2 {
    font-size: 17px;
    margin: 0 0 12px;
    font-weight: 600;
  }

  .card p {
    margin: 0 0 12px;
    color: var(--ink-soft);
    font-size: 15px;
  }

  .card p:last-child { margin-bottom: 0; }

  .key-points {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .key-points li {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--ink-soft);
  }

  .key-points li:last-child { border-bottom: none; }

  .key-points li::before {
    content: '';
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-top: 9px;
  }

  .sidebar-card + .sidebar-card { margin-top: 16px; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px dashed var(--border);
  }

  .info-row:last-child { border-bottom: none; }

  .info-row .label { color: var(--ink-muted); }
  .info-row .value { color: var(--ink); font-weight: 500; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 16px;
    border-radius: 10px;
    background: var(--brand);
    color: white;
    border: 0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    font-family: inherit;
  }

  .btn:hover { background: #1E47E0; }

  .btn-ghost {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border);
    margin-top: 8px;
  }

  .btn-ghost:hover { background: #F0F2F7; }

  footer {
    text-align: center;
    padding: 32px 0;
    color: var(--ink-muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    background: var(--surface);
  }

  @media (max-width: 880px) {
    .content-grid { grid-template-columns: 1fr; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">🎬</div>
        <span>AI 影片實驗室</span>
      </div>
      <div class="topbar-meta">2026-05-11 · 內部測試</div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <span class="badge">實驗中</span>
      <h1>AI 影片工作流實測 👀</h1>
      <p class="subtitle">這是我們內部在玩 AI 影片工作流的成果之一，純粹試水溫看效果。看完歡迎隨手丟回饋給我們，什麼都行——哪裡好笑、哪裡很怪、哪裡可以更好都歡迎。</p>
      <div class="meta-row">
        <span><strong>類型：</strong>內部測試</span>
        <span><strong>用途：</strong>工作流驗證</span>
        <span><strong>狀態：</strong>持續調整中</span>
      </div>
    </section>

    <section class="video-card">
      <div class="video-wrap">
        <iframe
          src="https://drive.google.com/file/d/1HiOsgCZbJeW-ShZmfo-n9VJZuqwa9K8_/preview"
          allow="autoplay; encrypted-media; fullscreen"
          allowfullscreen></iframe>
      </div>
      <div class="video-footer">
        <span>影片放在 Google Drive · 載不出來的話可能要先登入公司帳號</span>
        <a href="https://drive.google.com/file/d/1HiOsgCZbJeW-ShZmfo-n9VJZuqwa9K8_/view" target="_blank" rel="noopener">直接去 Drive 看 →</a>
      </div>
    </section>

  </main>

  <footer>
    內部測試頁，純玩玩看 · 別外流喔 🤫
  </footer>
</body>
</html>
