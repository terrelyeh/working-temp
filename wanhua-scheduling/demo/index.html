<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萬華世界排班系統 Demo · 2026 年 4 月</title>
<style>
  :root {
    --text: #2C3345;
    --text-soft: #6B7280;
    --text-mute: #9CA3AF;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E5E7EB;
    --border-soft: #F3F4F6;
    --accent: #2563EB;
    --accent-soft: #EFF6FF;
    --early-bg: #DBEAFE;
    --early-fg: #1E40AF;
    --early-border: #60A5FA;
    --noon-bg: #D1FAE5;
    --noon-fg: #065F46;
    --noon-border: #34D399;
    --late-bg: #EDE9FE;
    --late-fg: #5B21B6;
    --late-border: #A78BFA;
    --support-bg: #FEF3C7;
    --support-fg: #92400E;
    --support-border: #FBBF24;
    --off-bg: #F3F4F6;
    --off-fg: #6B7280;
    --holiday-bg: #FEE2E2;
    --holiday-fg: #991B1B;
    --event-bg: #F3F4F6;
    --event-fg: #4B5563;
  }
  * { box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    line-height: 1.7;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

  header { margin-bottom: 28px; }
  h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.02em; }
  .subtitle { color: var(--text-soft); font-size: 15px; margin: 0; }
  .disclaimer {
    display: inline-block; background: var(--accent-soft);
    color: var(--accent); padding: 4px 12px; border-radius: 999px;
    font-size: 13px; margin-top: 12px; font-weight: 500;
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 8px;
    background: var(--card); padding: 6px; border-radius: 12px;
    margin: 24px 0 20px; border: 1px solid var(--border);
    max-width: fit-content;
  }
  .tab {
    background: transparent; border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 15px; font-weight: 500;
    color: var(--text-soft); cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--text); color: white;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* Employee selector — custom combobox */
  .emp-selector-wrap { position: relative; margin-bottom: 20px; }
  .emp-trigger {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; font-family: inherit; color: var(--text);
    transition: all 0.15s; text-align: left;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .emp-trigger:hover { border-color: var(--accent); box-shadow: 0 3px 10px rgba(37,99,235,0.1); }
  .emp-trigger.open { border-color: var(--accent); box-shadow: 0 3px 10px rgba(37,99,235,0.15); }
  .emp-trigger-main { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .emp-trigger-label { font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em; }
  .emp-trigger-name { font-size: 22px; font-weight: 600; line-height: 1.25; }
  .emp-trigger-role {
    font-size: 13px; color: var(--text-soft);
    padding: 4px 12px; background: var(--border-soft); border-radius: 20px;
    font-weight: 500;
  }
  .emp-trigger-chevron { font-size: 18px; color: var(--text-soft); transition: transform 0.2s; }
  .emp-trigger.open .emp-trigger-chevron { transform: rotate(180deg); }

  .emp-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    z-index: 20; display: none;
    max-height: 460px; overflow-y: auto;
  }
  .emp-dropdown.open { display: block; }
  .emp-search {
    width: 100%; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-family: inherit; font-size: 15px; color: var(--text);
    margin-bottom: 10px; background: var(--bg);
  }
  .emp-search:focus { outline: none; border-color: var(--accent); background: white; }
  .emp-dropdown-list { display: flex; flex-direction: column; gap: 2px; }
  .emp-group-head {
    font-size: 11px; color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 10px 10px 4px; font-weight: 600;
  }
  .emp-option {
    background: transparent; border: none;
    padding: 10px 14px; border-radius: 8px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; font-family: inherit; color: var(--text);
    font-size: 15px; text-align: left;
  }
  .emp-option:hover { background: var(--accent-soft); }
  .emp-option.selected { background: var(--accent); color: white; }
  .emp-option .opt-name { flex: 1; font-weight: 500; }
  .emp-option .opt-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--border-soft); color: var(--text-soft); font-weight: 500;
  }
  .emp-option.selected .opt-tag { background: rgba(255,255,255,0.2); color: white; }
  .emp-option .opt-hours { font-size: 12px; color: var(--text-mute); font-variant-numeric: tabular-nums; }
  .emp-option.selected .opt-hours { color: rgba(255,255,255,0.8); }
  .emp-empty-state { padding: 20px; text-align: center; color: var(--text-soft); font-size: 14px; }
  .emp-filter { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .filter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-pill {
    background: var(--border-soft); border: 1px solid transparent;
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; font-family: inherit; color: var(--text-soft);
    transition: all 0.15s;
  }
  .filter-pill:hover { color: var(--text); border-color: var(--accent); }
  .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .filter-check { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-soft); cursor: pointer; user-select: none; }
  .filter-check input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
  .filter-check:hover { color: var(--text); }

  /* Avatar */
  .avatar {
    position: relative; display: inline-block;
    border-radius: 50%; overflow: hidden; flex-shrink: 0;
    user-select: none;
  }
  .avatar-fallback, .avatar-photo {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }
  .avatar-fallback {
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700;
  }
  .avatar-photo { z-index: 1; object-fit: cover; display: block; }
  .avatar-lg { width: 56px; height: 56px; font-size: 22px; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15); }
  .avatar-sm { width: 32px; height: 32px; font-size: 14px; }
  .avatar-xs { width: 22px; height: 22px; font-size: 11px; }

  /* Employee view: sticky wrap (stats + filters) */
  .emp-sticky-wrap {
    position: sticky; top: 0; z-index: 10;
    margin: 0 0 20px;
    background: var(--bg);
    padding-top: 4px;
  }
  .emp-stats {
    background: var(--text); color: white;
    border-radius: 12px 12px 0 0; padding: 16px 22px;
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
  }
  .emp-filter-bar {
    background: var(--card); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 12px 12px;
    padding: 12px 18px;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    box-shadow: 0 6px 20px -8px rgba(44, 51, 69, 0.15);
  }
  .emp-filter-bar .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .emp-filter-bar .filter-check { margin-left: auto; }
  .emp-stats .emp-name { font-size: 20px; font-weight: 600; color: white; }
  .emp-stats .emp-role {
    font-size: 12px; color: rgba(255,255,255,0.75);
    padding: 2px 10px; background: rgba(255,255,255,0.12);
    border-radius: 4px; letter-spacing: 0.02em;
  }
  .emp-hours {
    margin-left: auto; display: flex; gap: 18px; font-size: 13px;
    align-items: baseline; flex-wrap: wrap;
  }
  .hour-stat { text-align: right; }
  .hour-stat .label {
    color: rgba(255,255,255,0.55); font-size: 11px; display: block;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px;
  }
  .hour-stat .value { font-size: 16px; font-weight: 600; color: white; font-variant-numeric: tabular-nums; }
  .progress {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px; overflow: hidden;
    margin-top: 8px; flex-basis: 100%;
  }
  .progress-fill { height: 100%; background: #60A5FA; border-radius: 2px; transition: width 0.3s; }
  .emp-stats-admin-note { color: rgba(255,255,255,0.7); margin-left: auto; font-size: 14px; }

  /* Day list (employee view) */
  .day-list { display: flex; flex-direction: column; gap: 8px; }
  .day-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: grid; grid-template-columns: 90px 1fr; gap: 16px; align-items: center;
  }
  .day-row.holiday { background: linear-gradient(90deg, var(--holiday-bg) 0%, var(--card) 30%); border-color: var(--holiday-fg); }
  .day-row.off { background: var(--off-bg); opacity: 0.85; }
  .day-row.monday { background: #FAFAF8; opacity: 0.6; }
  .day-date {
    display: flex; flex-direction: column;
  }
  .day-date .md { font-size: 18px; font-weight: 600; }
  .day-date .wd { font-size: 12px; color: var(--text-soft); }
  .day-shift-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 500;
  }
  .day-shift-pill.early { background: var(--early-bg); color: var(--early-fg); }
  .day-shift-pill.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .day-shift-pill.late { background: var(--late-bg); color: var(--late-fg); }
  .day-shift-pill.support { background: var(--support-bg); color: var(--support-fg); }
  .day-shift-pill.off { background: var(--off-bg); color: var(--off-fg); }
  .day-shift-pill.holiday { background: var(--holiday-bg); color: var(--holiday-fg); }
  .day-notes {
    margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .note-pill {
    font-size: 12px; padding: 2px 8px; border-radius: 4px;
    background: var(--event-bg); color: var(--event-fg);
  }
  .note-pill.holiday-pill {
    background: #E5E7EB; color: #374151;
  }

  /* Store view: day cards */
  .day-nav {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  }
  .day-nav button {
    background: var(--border-soft); border: none; border-radius: 6px;
    width: 36px; height: 36px; cursor: pointer; font-size: 18px;
    font-family: inherit; color: var(--text);
  }
  .day-nav button:hover { background: var(--border); }
  .day-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .day-nav .current-date {
    flex: 1; text-align: center;
    font-size: 18px; font-weight: 600;
  }
  .day-nav .current-date small { display: block; font-size: 13px; color: var(--text-soft); font-weight: normal; }
  .day-nav input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-family: inherit; font-size: 14px; color: var(--text);
  }

  .day-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px 28px;
    margin-bottom: 12px;
  }
  .day-card.holiday { border-top: 4px solid var(--holiday-fg); }
  .day-card.long-day { border-top: 4px solid var(--support-border); }
  .day-card.monday { background: #F9FAFB; text-align: center; color: var(--text-soft); padding: 40px; }
  .day-card h2 {
    margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  .day-card .wd { font-size: 14px; color: var(--text-soft); font-weight: normal; }
  .day-card .holiday-tag {
    background: #E5E7EB; color: #374151;
    padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 500;
  }
  .day-card .event-tag {
    background: var(--event-bg); color: var(--event-fg);
    padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 500;
  }

  /* Timeline (day detail view) */
  .timeline { margin-top: 20px; }
  .tl-row {
    display: grid; grid-template-columns: 70px 6px 1fr;
    gap: 14px; align-items: stretch;
    position: relative;
  }
  .tl-time {
    font-size: 14px; font-weight: 600; color: var(--text);
    text-align: right; font-variant-numeric: tabular-nums;
    padding: 12px 0 8px; line-height: 1.3;
  }
  .tl-time .tl-end { display: block; font-size: 11px; color: var(--text-mute); font-weight: 400; }
  .tl-bar {
    background: var(--border-soft);
    border-radius: 3px; align-self: stretch;
    position: relative;
  }
  .tl-bar::before {
    content: ''; position: absolute; top: 16px; left: -3px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--text-mute); border: 2px solid var(--bg);
  }
  .tl-bar.early { background: var(--early-border); }
  .tl-bar.early::before { background: var(--early-fg); }
  .tl-bar.noon { background: var(--noon-border); }
  .tl-bar.noon::before { background: var(--noon-fg); }
  .tl-bar.late { background: var(--late-border); }
  .tl-bar.late::before { background: var(--late-fg); }
  .tl-bar.support { background: var(--support-border); }
  .tl-bar.support::before { background: var(--support-fg); }
  .tl-bar.note { background: var(--event-fg); opacity: 0.4; }
  .tl-bar.note::before { background: var(--event-fg); }
  .tl-content { padding: 8px 0 16px; }
  .tl-shift-head {
    display: flex; justify-content: space-between;
    padding: 10px 14px; border-radius: 8px;
    margin-bottom: 8px; align-items: baseline; flex-wrap: wrap; gap: 8px;
    font-weight: 600;
  }
  .tl-shift-head.early { background: var(--early-bg); color: var(--early-fg); }
  .tl-shift-head.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .tl-shift-head.late { background: var(--late-bg); color: var(--late-fg); }
  .tl-shift-head.support { background: var(--support-bg); color: var(--support-fg); }
  .tl-shift-head .count { font-size: 13px; font-weight: 500; opacity: 0.75; }
  .tl-note-card {
    background: var(--event-bg); color: var(--event-fg);
    padding: 10px 14px; border-radius: 8px;
    display: flex; gap: 8px; align-items: center; font-size: 14px;
  }
  .tl-note-card .tag {
    background: var(--event-fg); color: white;
    padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
  }
  .tl-untimed-group {
    margin-top: 12px; padding: 12px 16px;
    background: #F9FAFB; border-radius: 8px;
    border: 1px dashed var(--border);
  }
  .tl-untimed-group h4 {
    margin: 0 0 8px; font-size: 13px; color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .tl-untimed-group .items { display: flex; flex-direction: column; gap: 6px; }
  .tl-untimed-group .tl-note-card { margin: 0; }

  .shift-block {
    margin-top: 16px; padding: 14px 16px; border-radius: 10px;
    border-left: 4px solid;
  }
  .shift-block.early { background: var(--early-bg); border-color: var(--early-border); }
  .shift-block.noon { background: var(--noon-bg); border-color: var(--noon-border); }
  .shift-block.late { background: var(--late-bg); border-color: var(--late-border); }
  .shift-block.support { background: var(--support-bg); border-color: var(--support-border); }
  .shift-block h3 {
    margin: 0 0 8px; font-size: 15px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .shift-block .count { font-size: 13px; color: var(--text-soft); font-weight: 500; }
  .shift-block .people {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .person-chip {
    background: white; padding: 8px 16px; border-radius: 8px;
    font-size: 17px; font-weight: 600; color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.05);
    cursor: pointer; user-select: none;
    transition: all 0.12s ease;
  }
  .person-chip:hover {
    border-color: var(--accent); color: var(--accent);
    box-shadow: 0 2px 6px rgba(37,99,235,0.15);
    transform: translateY(-1px);
  }
  .person-chip:active { transform: translateY(0); }
  .person-chip.fulltime { font-weight: 700; }
  .person-chip.fulltime::before { content: "★ "; color: #F59E0B; font-size: 15px; }
  .tl-content .people { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }

  .off-section {
    margin-top: 16px; padding-top: 14px;
    border-top: 1px dashed var(--border);
    display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap;
  }
  .off-section .label { color: var(--text-soft); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
  .off-chip {
    background: var(--off-bg); color: var(--off-fg);
    padding: 3px 10px; border-radius: 4px; font-size: 13px;
  }

  .events-section {
    margin-top: 12px; display: flex; flex-direction: column; gap: 6px;
  }
  .event-row {
    font-size: 14px; color: var(--text-soft);
    display: flex; gap: 10px; align-items: baseline;
  }
  .event-row .time { color: var(--text); font-weight: 500; min-width: 50px; }
  .event-row .tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; background: var(--event-bg); color: var(--event-fg); }

  /* Month summary */
  .summary-table {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; border-collapse: collapse; font-size: 14px;
  }
  .summary-table th, .summary-table td {
    text-align: left; padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft);
  }
  .summary-table th {
    background: #F9FAFB; font-weight: 600; font-size: 13px;
    color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.03em;
  }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table .role-tag {
    font-size: 11px; padding: 1px 6px; border-radius: 3px;
  }
  .role-tag.fulltime { background: #FEF3C7; color: #92400E; }
  .role-tag.pt { background: #DBEAFE; color: #1E40AF; }
  .role-tag.admin { background: #FCE7F3; color: #9F1239; }

  /* Cowork search */
  .cowork-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; }
  .cowork-header { margin-bottom: 20px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .cowork-section { margin-top: 20px; }
  .cowork-label {
    font-size: 13px; color: var(--text-soft); display: flex;
    align-items: center; gap: 10px;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .cowork-count {
    background: var(--accent-soft); color: var(--accent);
    padding: 2px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    text-transform: none; letter-spacing: 0;
  }
  .cowork-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .cw-pill {
    background: var(--border-soft); border: 2px solid transparent;
    padding: 6px 14px; border-radius: 20px; font-size: 14px;
    cursor: pointer; font-family: inherit; color: var(--text);
    transition: all 0.15s;
  }
  .cw-pill:hover { border-color: var(--accent); }
  .cw-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .cw-pill:disabled { opacity: 0.3; cursor: not-allowed; }
  .cowork-modes { display: flex; gap: 6px; }
  .cowork-modes .mode-pill {
    background: var(--border-soft); border: 1px solid transparent;
    padding: 6px 16px; border-radius: 8px; font-size: 14px;
    cursor: pointer; font-family: inherit; color: var(--text-soft);
  }
  .cowork-modes .mode-pill:hover { color: var(--text); }
  .cowork-modes .mode-pill.active { background: var(--text); color: white; }

  .cowork-result { margin-top: 28px; }
  .cowork-stat {
    background: var(--accent-soft); border: 1px solid var(--accent);
    padding: 14px 18px; border-radius: 10px; margin-bottom: 16px;
    color: var(--accent); font-weight: 600;
  }
  .cowork-stat strong { font-size: 28px; font-weight: 700; margin-right: 6px; }
  .cowork-empty {
    padding: 40px; text-align: center;
    color: var(--text-soft); border: 1px dashed var(--border);
    border-radius: 10px; background: var(--bg);
  }
  .cowork-day {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
    display: grid; grid-template-columns: 100px 1fr; gap: 16px; align-items: start;
  }
  .cowork-day.long-day { border-left: 3px solid var(--support-border); }
  .cowork-day.holiday { border-left: 3px solid #9CA3AF; }
  .cowork-day .cd-date { font-size: 16px; font-weight: 600; }
  .cowork-day .cd-date small { display: block; font-size: 12px; color: var(--text-soft); font-weight: 400; }
  .cowork-day .cd-tag {
    display: inline-block; font-size: 11px; padding: 1px 6px;

  }
  .cowork-day .cd-shifts { display: flex; flex-direction: column; gap: 4px; }
  .cowork-shift-line {
    display: flex; gap: 8px; align-items: center;
    font-size: 14px; padding: 4px 10px; border-radius: 6px;
  }
  .cowork-shift-line.early { background: var(--early-bg); color: var(--early-fg); }
  .cowork-shift-line.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .cowork-shift-line.late { background: var(--late-bg); color: var(--late-fg); }
  .cowork-shift-line.support { background: var(--support-bg); color: var(--support-fg); }
  .cowork-shift-line .shift-name { font-weight: 600; min-width: 110px; font-variant-numeric: tabular-nums; }
  .cowork-shift-line .people { font-weight: 500; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;
    font-size: 13px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px;
  }
  .legend-item.early { background: var(--early-bg); color: var(--early-fg); }
  .legend-item.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .legend-item.late { background: var(--late-bg); color: var(--late-fg); }
  .legend-item.support { background: var(--support-bg); color: var(--support-fg); }
  .legend-item.off { background: var(--off-bg); color: var(--off-fg); }

  /* Store mode toggle */
  .store-mode-toggle {
    display: inline-flex; background: var(--border-soft);
    padding: 3px; border-radius: 8px; gap: 2px;
  }
  .store-mode-btn {
    background: transparent; border: none; padding: 6px 12px;
    border-radius: 6px; font-size: 13px; font-weight: 500;
    color: var(--text-soft); cursor: pointer; font-family: inherit;
  }
  .store-mode-btn:hover { color: var(--text); }
  .store-mode-btn.active { background: var(--card); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  /* Gantt view */
  .gantt-container {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: auto;
    max-height: calc(100vh - 220px);
  }
  #gantt-body {
    min-width: 1040px;
    display: grid;
    grid-template-columns: 130px 1fr;
  }
  .gantt-header-label {
    position: sticky; left: 0; top: 0; z-index: 3;
    background: var(--text); color: white;
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 10px 12px;
    border-right: 1px solid var(--border);
  }
  .gantt-header-times {
    position: sticky; top: 0; z-index: 2;
    background: var(--text); color: white;
    padding: 0; height: 38px; position: relative;
  }
  .gantt-time-marks {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: repeat(16, 1fr);
    align-items: center;
  }
  .gantt-time-mark {
    font-size: 11px; color: rgba(255,255,255,0.65);
    padding-left: 4px; font-variant-numeric: tabular-nums;
    border-left: 1px solid rgba(255,255,255,0.08);
  }
  .gantt-time-mark.major { color: white; border-left-color: rgba(255,255,255,0.25); }

  .gantt-row-label {
    position: sticky; left: 0; z-index: 1;
    background: var(--card); border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border-soft);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 3px;
    font-size: 13px;
  }
  .gantt-row-date { font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 6px; }
  .gantt-row-weekday { font-size: 12px; color: var(--text-soft); font-weight: 400; }
  .gantt-row-meta { font-size: 11px; color: var(--text-soft); line-height: 1.4; }
  .gantt-row-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: #E5E7EB; color: #374151;
    display: inline-block; margin-top: 3px;
  }
  .gantt-row-event { background: var(--event-bg); color: var(--event-fg); }
  .gantt-row-off { font-size: 11px; color: var(--text-mute); }

  .gantt-track {
    position: relative;
    background-image: repeating-linear-gradient(
      to right,
      transparent 0, transparent calc(100% / 16 - 1px),
      var(--border-soft) calc(100% / 16 - 1px), var(--border-soft) calc(100% / 16)

  .gantt-track.monday {

  .gantt-bar {
    position: absolute;
    height: 22px;
    border-radius: 4px;
    padding: 0 8px;
    font-size: 12px;
    font-weight: 600;
    color: white;
    display: flex;
    align-items: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .gantt-bar:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.18); z-index: 2; }
  .gantt-bar .bar-hours {
    font-size: 10px; opacity: 0.85; font-weight: 500; margin-right: 4px;
  }

  /* Store toolbar (sticky) */
  .store-toolbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250, 250, 248, 0.92);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    padding: 14px 16px; margin: 0 -16px 16px -16px;

  }
  .store-toolbar.shadowed {
    box-shadow: 0 4px 12px -4px rgba(0,0,0,0.08);
  }
  .toolbar-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .toolbar-hint { color: var(--text-soft); font-size: 13px; margin-right: auto; }
  .toolbar-right { display: flex; align-items: center; gap: 6px; }
  .toolbar-right input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-family: inherit; font-size: 14px; color: var(--text);
    background: var(--card);
  }
  .week-jumper {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .week-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px; font-size: 13px;
    cursor: pointer; font-family: inherit; color: var(--text);
    transition: all 0.15s;
    font-variant-numeric: tabular-nums;
  }
  .week-pill:hover { border-color: var(--accent); color: var(--accent); }
  .week-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .week-pill .week-range { opacity: 0.7; margin-left: 4px; font-weight: 500; }

  #all-days { display: flex; flex-direction: column; gap: 12px; }
  #all-days .day-card { scroll-margin-top: 80px; }
  #all-days .day-card.highlight {
    box-shadow: 0 0 0 3px var(--accent); animation: highlight 1.5s ease-out;
  }
  @keyframes highlight { from { box-shadow: 0 0 0 4px var(--accent); } to { box-shadow: 0 1px 2px rgba(0,0,0,0.04); } }

  /* Week view */
  .week-nav {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  }
  .week-nav button {
    background: var(--border-soft); border: none; border-radius: 6px;
    padding: 8px 14px; cursor: pointer; font-size: 14px;
    font-family: inherit; color: var(--text);
  }
  .week-nav button:hover { background: var(--border); }
  .week-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .week-nav .current-week { flex: 1; text-align: center; font-size: 16px; font-weight: 600; }

  .week-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .week-day {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 10px;
    display: flex; flex-direction: column; min-height: 260px;
  }
  .week-day.monday { background: #F9FAFB; opacity: 0.7; }
  .week-day.holiday { border-top: 3px solid var(--holiday-fg); }
  .week-day.long-day { background: linear-gradient(180deg, #FFFBEB 0%, var(--card) 40%); }
  .week-day.out-of-month {
    background: repeating-linear-gradient(45deg, #F9FAFB, #F9FAFB 10px, #F3F4F6 10px, #F3F4F6 20px);
    opacity: 0.6; cursor: not-allowed;
  }
  .week-day.out-of-month .wd-head, .week-day.out-of-month .wd-date { color: var(--text-mute); }
  .week-day .wd-head {
    font-size: 13px; color: var(--text-soft); font-weight: 500; margin-bottom: 2px;
  }
  .week-day .wd-date { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .week-day .wd-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--holiday-bg); color: var(--holiday-fg);
    margin-bottom: 6px; display: inline-block; width: fit-content;
  }
  .week-day .wd-event {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--event-bg); color: var(--event-fg);
    margin-bottom: 6px; display: inline-block; width: fit-content;
  }
  .week-shift {
    font-size: 11px; padding: 4px 6px; border-radius: 4px;
    margin-bottom: 4px;
  }
  .week-shift.early { background: var(--early-bg); color: var(--early-fg); }
  .week-shift.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .week-shift.late { background: var(--late-bg); color: var(--late-fg); }
  .week-shift.support { background: var(--support-bg); color: var(--support-fg); }
  .week-shift .shift-label { font-weight: 600; font-size: 11px; display: block; margin-bottom: 3px; }
  .week-shift .shift-time { font-weight: 500; opacity: 0.75; font-size: 10px; margin-left: 2px; font-variant-numeric: tabular-nums; }
  .week-shift .shift-names { line-height: 1.4; }
  .week-shift .star { color: #F59E0B; }
  .week-day .wd-off {
    margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--border);
    font-size: 10px; color: var(--text-soft);
  }
  .week-day.monday-closed {
    align-items: center; justify-content: center;
    color: var(--text-soft); font-size: 13px; text-align: center;
  }

  /* Month view */
  .month-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .shift-legend {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    font-size: 12px; font-variant-numeric: tabular-nums;
  }
  .legend-pill {
    padding: 3px 10px; border-radius: 4px; font-weight: 500;
  }
  .legend-pill.early { background: var(--early-bg); color: var(--early-fg); }
  .legend-pill.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .legend-pill.late { background: var(--late-bg); color: var(--late-fg); }
  .legend-pill.support { background: var(--support-bg); color: var(--support-fg); }
  .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .month-head-cell {
    font-size: 12px; color: var(--text-soft); text-align: center;
    padding: 6px 0; font-weight: 600; letter-spacing: 0.05em;
  }
  .month-cell {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; min-height: 90px;
    cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; gap: 3px;
  }
  .month-cell:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(37,99,235,0.1); }
  .month-cell.empty { background: transparent; border: none; cursor: default; }
  .month-cell.empty:hover { box-shadow: none; }
  .month-cell.monday { background: #F9FAFB; opacity: 0.6; cursor: default; }
  .month-cell.monday:hover { box-shadow: none; border-color: var(--border); }
  .month-cell.holiday { border-top: 3px solid var(--holiday-fg); }
  .month-cell.long-day { background: linear-gradient(180deg, #FFFBEB 0%, var(--card) 40%); }
  .month-cell.out-of-month {
    background: repeating-linear-gradient(45deg, #F9FAFB, #F9FAFB 8px, #F3F4F6 8px, #F3F4F6 16px);
    opacity: 0.5; cursor: default;
  }
  .month-cell.out-of-month:hover { box-shadow: none; border-color: var(--border); }
  .month-cell.out-of-month .m-date { color: var(--text-mute); }
  .month-cell .m-date { font-size: 14px; font-weight: 600; }
  .month-cell .m-holiday { font-size: 10px; color: var(--holiday-fg); font-weight: 500; }
  .month-cell .m-event { font-size: 10px; color: var(--event-fg); font-weight: 500; line-height: 1.3; }
  .month-cell .m-counts {
    display: flex; gap: 4px; flex-wrap: wrap; margin-top: auto;
    font-size: 10px;
  }
  .m-count-pill {
    padding: 1px 5px; border-radius: 3px; font-weight: 600;
  }
  .m-count-pill.early { background: var(--early-bg); color: var(--early-fg); }
  .m-count-pill.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .m-count-pill.late { background: var(--late-bg); color: var(--late-fg); }
  .m-count-pill.support { background: var(--support-bg); color: var(--support-fg); }
  .month-cell .m-off {
    font-size: 10px; color: var(--text-mute); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  @media (max-width: 900px) {
    .week-grid { grid-template-columns: 1fr; gap: 8px; }
    .week-day { min-height: auto; padding: 14px 16px; }
    .week-day .wd-head, .week-day .wd-date {
      display: inline-block; margin-bottom: 0; margin-right: 8px;
    }
    .week-day .wd-head { font-size: 13px; }
    .week-day .wd-date { font-size: 17px; }
    .week-day .wd-tag, .week-day .wd-event { font-size: 11px; margin-top: 6px; }
    .week-shift {
      font-size: 13px; padding: 8px 12px; margin-top: 8px; margin-bottom: 0;
    }
    .week-shift .shift-label { font-size: 12px; }
    .week-shift .shift-time { font-size: 11px; }
    .week-day .wd-off { margin-top: 10px; font-size: 12px; }

    .month-cell { min-height: 70px; padding: 6px 8px; }
    .month-cell .m-date { font-size: 13px; }
    .m-count-pill { font-size: 9px; }
  }
  @media (max-width: 640px) {
    .wrap { padding: 20px 14px 80px; }
    h1 { font-size: 22px; }
    header { margin-bottom: 20px; padding-bottom: 20px; }

    /* Tabs — horizontal scroll if needed */
    .tabs {
      padding: 4px; gap: 4px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap; max-width: 100%;

    .tab { padding: 8px 14px; font-size: 14px; white-space: nowrap; flex-shrink: 0; }

    /* Employee trigger */
    .emp-trigger { padding: 12px 16px; gap: 10px; }
    .emp-trigger-name { font-size: 19px; }
    .emp-trigger-role { font-size: 12px; padding: 3px 10px; }

    /* Employee dropdown */
    .emp-dropdown { max-height: 60vh; }

    /* Sticky dark header */
    .emp-stats {
      gap: 10px; padding: 14px 16px; align-items: flex-start; flex-direction: column;
    }
    .emp-stats .emp-name { font-size: 18px; }
    .emp-hours {
      margin-left: 0; gap: 14px; font-size: 12px; width: 100%;
      justify-content: space-between;
    }
    .hour-stat .label { font-size: 10px; }
    .hour-stat .value { font-size: 14px; }

    /* Filter bar */
    .emp-filter-bar { padding: 10px 14px; gap: 10px; }
    .emp-filter-bar .filter-check { margin-left: 0; width: 100%; padding-top: 4px; border-top: 1px dashed var(--border); }
    .filter-pill { padding: 5px 12px; font-size: 13px; }

    /* Day row in employee view */
    .day-row { grid-template-columns: 62px 1fr; padding: 10px 12px; gap: 10px; }
    .day-date .md { font-size: 16px; }
    .day-shift-pill { font-size: 13px; padding: 5px 11px; }

    /* Day cards in store view */
    .day-card { padding: 16px 18px; }
    .day-card h2 { font-size: 18px; gap: 8px; }

    /* Timeline */
    .tl-row { grid-template-columns: 54px 5px 1fr; gap: 10px; }
    .tl-time { font-size: 13px; padding: 10px 0 6px; }
    .tl-time .tl-end { font-size: 10px; }
    .tl-shift-head { padding: 8px 12px; font-size: 14px; }
    .tl-shift-head .count { font-size: 12px; }
    .tl-note-card { padding: 8px 12px; font-size: 13px; }
    .person-chip { font-size: 15px; padding: 6px 12px; border-radius: 6px; }
    .person-chip.fulltime::before { font-size: 13px; }

    /* Store toolbar */
    .store-toolbar { padding: 12px 14px; margin: 0 -14px 16px -14px; }
    .toolbar-row h2 { font-size: 18px; }
    .toolbar-hint { font-size: 12px; }
    .week-pill { padding: 4px 10px; font-size: 12px; }
    .shift-legend { font-size: 11px; gap: 4px; }

    /* Cowork panel */
    .cowork-panel { padding: 18px 16px; }
    .cowork-header h2 { font-size: 18px; }
    .cw-pill { padding: 5px 12px; font-size: 13px; }
    .cowork-modes .mode-pill { padding: 6px 14px; font-size: 13px; }
    .cowork-day { grid-template-columns: 75px 1fr; padding: 12px 14px; gap: 12px; }
    .cowork-day .cd-date { font-size: 15px; }
    .cowork-shift-line { font-size: 13px; padding: 4px 8px; }

    .cowork-stat { padding: 12px 16px; }

    /* Summary table → horizontal scroll */
    .summary-table {
      display: block; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }

    /* Legend row */
    .legend { gap: 4px; }
    .legend-item { font-size: 12px; padding: 3px 8px; }
  }

  @media (max-width: 400px) {
    h1 { font-size: 20px; }
    .tab { padding: 7px 10px; font-size: 13px; }
    .emp-trigger-name { font-size: 17px; }
    .emp-stats .emp-name { font-size: 17px; }
    .hour-stat .value { font-size: 13px; }
    .person-chip { font-size: 14px; padding: 5px 10px; }
    .tl-row { grid-template-columns: 48px 4px 1fr; gap: 8px; }
  }
</style>

<body>
<div class="wrap">

<header>
  <h1>🗓️ 萬華世界排班系統 Demo</h1>
  <p class="subtitle">2026 年 4 月 · 取自實際 Google Sheet 資料</p>
  <span class="disclaimer">這是 UI 概念展示；資料從現有班表抽取，可能有遺漏</span>
</header>

<div class="tabs">
  <button class="tab active" data-tab="employee">👤 員工版</button>
  <button class="tab" data-tab="store">🏪 全店版</button>
  <button class="tab" data-tab="cowork">🔍 搭班查詢</button>
  <button class="tab" data-tab="summary">📊 月度統計</button>
</div>

<!-- ============ Employee View ============ -->
<section class="view active" id="view-employee">
  <div class="emp-selector-wrap">
    <button class="emp-trigger" id="emp-trigger" aria-haspopup="listbox">
      <span id="emp-trigger-avatar"></span>
      <div class="emp-trigger-main">
        <span class="emp-trigger-label">目前顯示</span>
        <span class="emp-trigger-name" id="emp-trigger-name">超威</span>
      </div>
      <span class="emp-trigger-role" id="emp-trigger-role">正職</span>
      <span class="emp-trigger-chevron">▾</span>
    </button>
    <div class="emp-dropdown" id="emp-dropdown" role="listbox">
      <input type="text" class="emp-search" id="emp-search" placeholder="🔍 搜尋員工姓名...">
      <div class="emp-dropdown-list" id="emp-dropdown-list"></div>
    </div>
  </div>

  <div class="emp-sticky-wrap">
    <div class="emp-stats" id="emp-stats"></div>
    <div class="emp-filter-bar">
      <div class="filter-pills">
        <button class="filter-pill" data-filter="all">全部</button>
        <button class="filter-pill active" data-filter="scheduled">只有排班</button>
        <button class="filter-pill" data-filter="off">只有未排班</button>
      </div>
      <label class="filter-check">
        <input type="checkbox" id="show-events" checked>
        <span>顯示店內活動</span>
      </label>
    </div>

const FALLBACK_COLORS = ['#2563EB','#16A34A','#DC2626','#9333EA','#EA580C','#0891B2','#CA8A04','#DB2777','#7C3AED','#059669'];
function colorFor(name) {
  if (EMPLOYEE_COLORS[name]) return EMPLOYEE_COLORS[name];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return FALLBACK_COLORS[h % FALLBACK_COLORS.length];
}

// Some bg colors are too light — compute readable text color
function textColorFor(bg) {
  const hex = bg.replace('#','');
  const r = parseInt(hex.slice(0,2), 16);
  const g = parseInt(hex.slice(2,4), 16);
  const b = parseInt(hex.slice(4,6), 16);
  // Perceived luminance
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.6 ? '#2C3345' : 'white';
}
function avatarHtml(name, size) {
  const emp = EMPLOYEES.find(e => e.name === name);
  const initial = (emp && emp.initial) || (name || '?').slice(0, 1);
  const bg = colorFor(name || '?');
  const fg = textColorFor(bg);
  if (emp && emp.avatar) {
    return `<span class="avatar avatar-${size}"><img class="avatar-photo" src="${emp.avatar}" alt="${name}" data-initial="${initial}" data-bg="${bg}" data-fg="${fg}" onerror="avatarImgError(this)"></span>`;
  }
  return `<span class="avatar avatar-${size}" style="background:${bg}"><span class="avatar-fallback" style="color:${fg}">${initial}</span></span>`;
}

function avatarImgError(img) {
  const wrap = img.parentElement;
  wrap.style.background = img.dataset.bg;
  wrap.innerHTML = `<span class="avatar-fallback" style="color:${img.dataset.fg}">${img.dataset.initial}</span>`;
}

function findShiftsForEmployee(name) {
  const result = [];
  for (const [date, day] of Object.entries(SCHEDULE)) {
    if (day.type === 'monday') {
      result.push({ date, day, status: 'monday' });
      continue;
    }
    if (day.off && day.off.includes(name)) {
      result.push({ date, day, status: 'off' });
      continue;
    }
    const shifts = [];
    for (const k of ['early8', 'noon8', 'late75', 'support']) {
      if (day[k] && day[k].includes(name)) shifts.push(k);
    }
    if (shifts.length) {
      result.push({ date, day, status: 'work', shifts });
    } else {
      result.push({ date, day, status: 'rest' });
    }
  }
  return result;
}

  const shown = EMPLOYEES
    .filter(e => e.role !== 'admin' || e.name === 'Winnie')

  const groups = {
    admin: shown.filter(e => e.role === 'admin'),
    fulltime: shown.filter(e => e.role === 'fulltime'),
    pt: shown.filter(e => e.role === 'pt'),
  };

  let html = '';
  const addGroup = (label, items) => {
    if (!items.length) return;
    html += `<div class="emp-group-head">${label}</div>`;
    items.forEach(e => {
      const roleLabel = e.role === 'fulltime' ? '正職' : e.role === 'admin' ? '主管' : 'PT';
      const hoursText = e.target ? `${e.target}h` : '';
      const selected = e.name === currentEmployeeName ? 'selected' : '';
      html += `
        <button class="emp-option ${selected}" data-name="${e.name}">
          ${avatarHtml(e.name, 'sm')}
          <span class="opt-name">${e.name}</span>
          ${hoursText ? `<span class="opt-hours">${hoursText}</span>` : ''}
          <span class="opt-tag">${roleLabel}</span>
        </button>
      `;
    });
  };
  addGroup('主管', groups.admin);
  addGroup('正職', groups.fulltime);
  addGroup('PT', groups.pt);
  if (!html) html = `<div class="emp-empty-state">找不到符合的員工</div>`;
  list.innerHTML = html;

  list.querySelectorAll('.emp-option').forEach(btn => {
    btn.addEventListener('click', () => {
      selectEmployee(btn.dataset.name);
      closeEmpDropdown();
    });
  });
}

    `;
  }

  const list = document.getElementById('emp-day-list');
  const filter = document.querySelector('.filter-pill.active')?.dataset.filter || 'all';
  const showEvents = document.getElementById('show-events')?.checked ?? true;
  let days = findShiftsForEmployee(name);
  if (filter === 'scheduled') days = days.filter(d => d.status === 'work');
  else if (filter === 'off') days = days.filter(d => d.status !== 'work' && d.status !== 'monday');
  if (!days.length) { list.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-soft);">沒有符合條件的日期</div>`; return; }
  list.innerHTML = days.map(({ date, day, status, shifts }) => {
    const d = new Date(date);
    const mdFmt = `${d.getMonth() + 1}/${d.getDate()}`;
    const cls = ['day-row'];
    if (status === 'monday') cls.push('monday');
    if (status === 'off') cls.push('off');
    if (day.holiday) cls.push('holiday');

    let pill = '';
    if (status === 'monday') pill = '<span class="day-shift-pill off">週一公休</span>';
    else if (status === 'off') pill = '<span class="day-shift-pill off">休</span>';
    else if (status === 'rest') pill = '<span class="day-shift-pill off" style="background: transparent; color: var(--text-mute);">未排班</span>';
    else pill = shifts.map(s => `<span class="day-shift-pill ${SHIFT_INFO[s].key}">${SHIFT_INFO[s].label}</span>`).join(' ');

    const events = [];
    if (showEvents) {
      if (day.holiday) events.push(`<span class="note-pill holiday-pill">🗓️ ${day.holiday}</span>`);
      if (day.event) events.push(`<span class="note-pill">📌 ${day.event}</span>`);
      if (day.notes) day.notes.forEach(n => events.push(`<span class="note-pill">${n.tag || ''} ${n.text}</span>`));
    }

    return `
      <div class="${cls.join(' ')}">
        <div class="day-date">
          <span class="md">${mdFmt}</span>
          <span class="wd">週${day.wd}</span>
        </div>
        <div>
          ${pill}
          ${events.length ? `<div class="day-notes">${events.join('')}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function buildDayCardHtml(date) {
  const day = SCHEDULE[date];
  if (!day) return '';
  const d = new Date(date);
  const mdFmt = `${d.getMonth() + 1} 月 ${d.getDate()} 日`;

  if (day.type === 'monday') {
    return `
      <div class="day-card monday" id="card-${date}">
        <h2 style="justify-content: center;">${mdFmt} 週${day.wd}</h2>
        <p>週一公休 · 全體休假</p>
      </div>
    `;
  }

  const tags = [];
  if (day.holiday) tags.push(`<span class="holiday-tag">🎉 ${day.holiday}</span>`);
  if (day.event) tags.push(`<span class="event-tag">📌 ${day.event}</span>`);

  // === Build timeline events ===
  const timelineEvents = [];
  const shiftTimes = {
    early10: { start: '09:00', end: '19:00' },
    early8:  { start: '09:00', end: '17:00' },
    noon8:   { start: '11:00', end: '19:00' },
    support: { start: '17:00', end: '19:00' },
    late75:  { start: '17:00', end: '次日 00:30' },
  };
  for (const key of ['early10','early8','noon8','support','late75']) {
    if (day[key] && day[key].length) {
      timelineEvents.push({ sort: shiftTimes[key].start, type: 'shift', key, start: shiftTimes[key].start, end: shiftTimes[key].end, people: day[key] });
    }
  }
  const untimed = [];
  if (day.notes) {
    day.notes.forEach(n => {
      const t = n.time;
      const isTimed = t && /^\d{1,2}:\d{2}$/.test(t);
      if (isTimed) {
        timelineEvents.push({ sort: t, type: 'note', time: t, tag: n.tag, text: n.text });
      } else {
        untimed.push({ time: t, tag: n.tag, text: n.text });
      }
    });
  }
  timelineEvents.sort((a, b) => a.sort.localeCompare(b.sort));

  const timelineHtml = timelineEvents.map(ev => {
    if (ev.type === 'shift') {
      const info = SHIFT_INFO[ev.key];
      const peopleHtml = ev.people.map(n => `<span class="person-chip ${isFullTime(n) ? 'fulltime' : ''}" data-emp="${n}" title="點擊查看 ${n} 的個人班表">${n}</span>`).join('');
      return `
        <div class="tl-row">
          <div class="tl-time">${ev.start}<span class="tl-end">至 ${ev.end}</span></div>
          <div class="tl-bar ${info.key}"></div>
          <div class="tl-content">
            <div class="tl-shift-head ${info.key}">
              <span>${info.label}</span>
              <span class="count">${ev.people.length} 人 · ${info.hours}h</span>
            </div>
            <div class="people">${peopleHtml}</div>
          </div>
        </div>`;
    } else {
      return `
        <div class="tl-row">
          <div class="tl-time">${ev.time}</div>
          <div class="tl-bar note"></div>
          <div class="tl-content">
            <div class="tl-note-card">
              ${ev.tag ? `<span class="tag">${ev.tag}</span>` : '📝'}
              <span>${ev.text}</span>
            </div>
          </div>
        </div>`;
    }
  }).join('');

  const untimedHtml = untimed.length ? `
    <div class="tl-untimed-group">
      <h4>當日事項（無固定時間）</h4>
      <div class="items">
        ${untimed.map(n => `
          <div class="tl-note-card">
            ${n.tag ? `<span class="tag">${n.tag}</span>` : '📝'}
            <span>${n.text}</span>
            ${n.time && n.time !== '—' ? `<span style="margin-left: auto; font-size: 12px; opacity: 0.8;">${n.time}</span>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  const offHtml = day.off && day.off.length ? `
    <div class="off-section">
      <span class="label">休</span>
      ${day.off.map(n => `<span class="off-chip">${n}</span>`).join('')}
    </div>
  ` : '';

  return `
    <div class="day-card ${day.holiday ? 'holiday' : ''} ${day.type === 'long' ? 'long-day' : ''}" id="card-${date}">
      <h2>${mdFmt} <span class="wd">週${day.wd}</span> ${tags.join(' ')}</h2>
      <div class="timeline">${timelineHtml}</div>
      ${untimedHtml}
      ${offHtml}
    </div>
  `;
}

// ============ Gantt view ============
const GANTT_START = 9;   // 09:00
const GANTT_END = 25;    // 01:00 next day (24:30 = 24.5)
const GANTT_SPAN = GANTT_END - GANTT_START;

function parseShiftTime(t) {
  if (!t) return 0;
  if (t.includes('00:30')) return 24.5;
  const [h, m] = t.split(':').map(Number);
  return h + (m || 0) / 60;
}

function renderGantt() {
  const body = document.getElementById('gantt-body');
  const dates = Object.keys(SCHEDULE).sort();

  // Header row
  const timeMarks = [];
  for (let h = GANTT_START; h <= GANTT_END; h++) {
    const hr = h >= 24 ? h - 24 : h;
    const label = `${String(hr).padStart(2,'0')}`;
    const isMajor = h % 2 === 1; // every 2 hours
    timeMarks.push(`<div class="gantt-time-mark ${isMajor ? 'major' : ''}">${label}</div>`);
  }
  // First column empty header + time header spanning 16 columns over 16 hours
  let html = `
    <div class="gantt-header-label">日期</div>
    <div class="gantt-header-times">
      <div class="gantt-time-marks">${timeMarks.slice(0, 16).join('')}</div>
    </div>
  `;

  const shiftTimes = {
    early10: { start: 9,   end: 19 },
    early8:  { start: 9,   end: 17 },
    noon8:   { start: 11,  end: 19 },
    support: { start: 17,  end: 19 },
    late75:  { start: 17,  end: 24.5 },
  };

  for (const date of dates) {
    const day = SCHEDULE[date];
    const d = new Date(date);
    const mdFmt = `${d.getMonth()+1}/${d.getDate()}`;

    if (day.type === 'monday') {
      html += `
        <div class="gantt-row-label" id="gantt-row-${date}" data-date="${date}">
          <div class="gantt-row-date">${mdFmt} <span class="gantt-row-weekday">週${day.wd}</span></div>
          <div class="gantt-row-off">公休</div>
        </div>
        <div class="gantt-track monday" style="height: 44px;"></div>
      `;
      continue;
    }

    // Collect bars
    const bars = [];
    for (const [key, times] of Object.entries(shiftTimes)) {
      if (day[key] && day[key].length) {
        day[key].forEach(name => {
          bars.push({ name, key, start: times.start, end: times.end });
        });
      }
    }

    const barHtml = bars.map((b, i) => {
      const sPct = ((b.start - GANTT_START) / GANTT_SPAN) * 100;
      const ePct = ((b.end - GANTT_START) / GANTT_SPAN) * 100;
      const bg = colorFor(b.name);
      const fg = textColorFor(bg);
      const hours = (b.end - b.start).toFixed(b.end % 1 ? 1 : 0);
      return `<div class="gantt-bar" style="top: ${4 + i * 26}px; left: ${sPct}%; width: ${ePct - sPct}%; background: ${bg}; color: ${fg}" data-emp="${b.name}" title="${b.name} · ${b.start}:00–${b.end}h">
        <span class="bar-hours">${hours}h</span>${b.name}
      </div>`;
    }).join('');

    const trackHeight = Math.max(44, bars.length * 26 + 8);

    const metaParts = [];
    if (day.holiday) metaParts.push(`<span class="gantt-row-tag">${day.holiday}</span>`);
    if (day.event) metaParts.push(`<span class="gantt-row-tag gantt-row-event">${day.event}</span>`);
    if (day.off?.length) metaParts.push(`<div class="gantt-row-off">休：${day.off.join('、')}</div>`);

    html += `
      <div class="gantt-row-label" id="gantt-row-${date}" data-date="${date}" style="min-height: ${trackHeight}px;">
        <div class="gantt-row-date">${mdFmt} <span class="gantt-row-weekday">週${day.wd}</span></div>
        ${metaParts.join('')}
      </div>
      <div class="gantt-track" style="height: ${trackHeight}px;">${barHtml}</div>
    `;
  }

  body.innerHTML = html;

  // Click a bar → jump to that employee
  body.querySelectorAll('.gantt-bar[data-emp]').forEach(bar => {
    bar.addEventListener('click', () => jumpToEmployee(bar.dataset.emp));
  });
}

function setupScrollTracking() {
  const toolbar = document.querySelector('.store-toolbar');
  const cards = Array.from(document.querySelectorAll('#all-days .day-card'));

  // Shadow on sticky toolbar when scrolled
  const sentinel = document.createElement('div');
  sentinel.style.cssText = 'position:absolute;top:0;left:0;width:1px;height:1px;';
  document.getElementById('view-store').prepend(sentinel);
  new IntersectionObserver(([entry]) => {
    toolbar.classList.toggle('shadowed', !entry.isIntersecting);
  }, { threshold: 0 }).observe(sentinel);

  // Highlight current week pill based on viewport
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const date = id.replace('card-', '');
        const weekIdx = WEEK_JUMPS.findIndex(w => date >= w.firstDate && date <= w.lastDate);
        if (weekIdx >= 0) {
          document.querySelectorAll('.week-pill').forEach((p, i) => {
            p.classList.toggle('active', i === weekIdx);
          });
        }
      }
    });
  }, { rootMargin: '-40% 0px -50% 0px' });
  cards.forEach(c => observer.observe(c));
}

const coworkSelected = new Set();
const MAX_COWORK = 4;

function renderCoworkPills() {
  const c = document.getElementById('cowork-pills');
  c.innerHTML = EMPLOYEES
    .filter(e => e.role !== 'admin' || e.name === 'Winnie')
    .map(e => `<button class="cw-pill" data-name="${e.name}">${e.name}</button>`)
    .join('');
  c.querySelectorAll('.cw-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name;
      if (coworkSelected.has(name)) {
        coworkSelected.delete(name);
        btn.classList.remove('active');
      } else if (coworkSelected.size < MAX_COWORK) {
        coworkSelected.add(name);
        btn.classList.add('active');
      }
      updateCoworkPillsDisabled();
      renderCoworkResult();
    });
  });
}

function updateCoworkPillsDisabled() {
  const full = coworkSelected.size >= MAX_COWORK;
  document.querySelectorAll('.cw-pill').forEach(btn => {
    btn.disabled = full && !coworkSelected.has(btn.dataset.name);
  });
  document.getElementById('cowork-count').textContent = `${coworkSelected.size} / ${MAX_COWORK}`;
}

function findCoworkDays(names, mode) {
  const results = [];
  for (const [date, day] of Object.entries(SCHEDULE)) {
    if (day.type === 'monday') continue;
    const shiftKeys = ['early10','early8','noon8','support','late75'];

    if (mode === 'same-day') {
      const shiftsByPerson = {};
      let allWorking = true;
      for (const n of names) {
        const found = shiftKeys.find(k => day[k]?.includes(n));
        if (!found) { allWorking = false; break; }
        shiftsByPerson[n] = found;
      }
      if (allWorking) results.push({ date, day, shiftsByPerson });
    } else {
      // same-shift: all names in the same shift key
      for (const k of shiftKeys) {
        if (day[k] && names.every(n => day[k].includes(n))) {
          results.push({ date, day, sameShift: k });
        }
      }
    }
  }
  return results;
}

function renderCoworkResult() {
  const result = document.getElementById('cowork-result');
  if (coworkSelected.size < 2) {
    result.innerHTML = `<div class="cowork-empty">請至少選擇 2 位員工</div>`;
    return;
  }

  const names = [...coworkSelected];
  const mode = document.querySelector('#view-cowork .mode-pill.active').dataset.mode;
  const days = findCoworkDays(names, mode);

  const statHtml = `
    <div class="cowork-stat">
      <strong>${days.length}</strong>
      天${mode === 'same-day' ? '同日上班' : '同班次'}
      <span style="font-weight: 400; opacity: 0.85;">· ${names.join(' + ')}</span>
    </div>
  `;

  if (!days.length) {
    result.innerHTML = statHtml + `<div class="cowork-empty">4 月沒有符合條件的日期</div>`;
    return;
  }

  const listHtml = days.map(({ date, day, shiftsByPerson, sameShift }) => {
    const d = new Date(date);
    const mdFmt = `${d.getMonth()+1}/${d.getDate()}`;
    const cls = ['cowork-day'];
    if (day.type === 'long') cls.push('long-day');
    if (day.holiday) cls.push('holiday');

    const tag = day.holiday ? `<div class="cd-tag">${day.holiday}</div>`
              : day.event ? `<div class="cd-tag">${day.event}</div>` : '';

    let shiftsHtml;
    if (sameShift) {
      const info = SHIFT_INFO[sameShift];
      shiftsHtml = `
        <div class="cowork-shift-line ${info.key}">
          <span class="shift-name">${info.label}</span>
          <span class="people">${names.join('、')}</span>
        </div>
      `;
    } else {
      // Group by shift
      const grouped = {};
      for (const [name, key] of Object.entries(shiftsByPerson)) {
        (grouped[key] ||= []).push(name);
      }
      shiftsHtml = Object.entries(grouped).map(([k, ppl]) => {
        const info = SHIFT_INFO[k];
        return `
          <div class="cowork-shift-line ${info.key}">
            <span class="shift-name">${info.label}</span>
            <span class="people">${ppl.join('、')}</span>
          </div>
        `;
      }).join('');
    }

    return `
      <div class="${cls.join(' ')}">
        <div>
          <div class="cd-date">${mdFmt}<small>週${day.wd}</small></div>
          ${tag}
        </div>
        <div class="cd-shifts">${shiftsHtml}</div>
      </div>
    `;
  }).join('');

  result.innerHTML = statHtml + listHtml;
}

// Week = Monday ~ Sunday. April 2026 weeks:

  { label: '第 1 週', start: '2026-03-30', days: ['2026-03-30','2026-03-31','2026-04-01','2026-04-02','2026-04-03','2026-04-04','2026-04-05'] },

  { label: '第 4 週', start: '2026-04-20', days: ['2026-04-20','2026-04-21','2026-04-22','2026-04-23','2026-04-24','2026-04-25','2026-04-26'] },
  { label: '第 5 週', start: '2026-04-27', days: ['2026-04-27','2026-04-28','2026-04-29','2026-04-30','2026-05-01','2026-05-02','2026-05-03'] },
];
let currentWeekIdx = 1; // default to 第 2 週 (4/6–4/12)

function renderWeekView() {
  const week = WEEKS[currentWeekIdx];
  const first = week.days[0], last = week.days[6];
  const fmt = d => { const x = new Date(d); return `${x.getMonth()+1}/${x.getDate()}`; };
  document.getElementById('current-week').textContent = `${week.label} · ${fmt(first)} – ${fmt(last)}`;
  document.getElementById('prev-week').disabled = currentWeekIdx === 0;
  document.getElementById('next-week').disabled = currentWeekIdx === WEEKS.length - 1;

  const grid = document.getElementById('week-grid');
  const WD_NAMES = ['一','二','三','四','五','六','日'];

  grid.innerHTML = week.days.map((date, i) => {
    const day = SCHEDULE[date];
    const d = new Date(date);
    const mdFmt = `${d.getMonth()+1}/${d.getDate()}`;

    if (!day) {
      return `<div class="week-day out-of-month">
        <div class="wd-head">週${WD_NAMES[i]}</div>
        <div class="wd-date">${mdFmt}</div>
        <div style="color: var(--text-mute); font-size: 11px;">非四月</div>
      </div>`;
    }

    if (day.type === 'monday') {
      return `<div class="week-day monday monday-closed">
        <div class="wd-head">週${day.wd}</div>
        <div class="wd-date">${mdFmt}</div>
        <div>公休</div>
      </div>`;
    }

    const shiftHtml = (key) => {
      const list = day[key];
      if (!list || !list.length) return '';
      const info = SHIFT_INFO[key];
      const names = list.map(n => isFullTime(n) ? `<span class="star">★</span>${n}` : n).join('、');
      const [shiftName, shiftTime] = info.label.split(' ');
      return `<div class="week-shift ${info.key}">
        <span class="shift-label">${shiftName} <span class="shift-time">${shiftTime}</span></span>
        <span class="shift-names">${names}</span>
      </div>`;
    };

    const cls = ['week-day'];
    if (day.holiday) cls.push('holiday');
    if (day.type === 'long') cls.push('long-day');

    return `<div class="${cls.join(' ')}">
      <div class="wd-head">週${day.wd}</div>
      <div class="wd-date">${mdFmt}</div>
      ${day.holiday ? `<span class="wd-tag">🎉 ${day.holiday}</span>` : ''}
      ${day.event ? `<span class="wd-event">📌 ${day.event}</span>` : ''}
      ${shiftHtml('early8')}
      ${shiftHtml('noon8')}
      ${shiftHtml('late75')}
      ${shiftHtml('support')}
      ${day.off && day.off.length ? `<div class="wd-off">休：${day.off.join('、')}</div>` : ''}
    </div>`;
  }).join('');
}

// ============ Month View ============
function renderMonthView() {
  const grid = document.getElementById('month-grid');
  // Header row
  const heads = ['週一','週二','週三','週四','週五','週六','週日']
    .map(w => `<div class="month-head-cell">${w}</div>`).join('');

  // April 2026: 4/1 is 週三. So first row: Mon=空, Tue=空, Wed=4/1 ...
  const cells = [];
  // 2 empty cells (Mon, Tue of pre-April)
  cells.push(`<div class="month-cell empty"></div>`);
  cells.push(`<div class="month-cell empty"></div>`);

  for (let d = 1; d <= 30; d++) {
    const dateStr = `2026-04-${String(d).padStart(2,'0')}`;
    const day = SCHEDULE[dateStr];
    if (!day) { cells.push(`<div class="month-cell empty"></div>`); continue; }

    if (day.type === 'monday') {
      cells.push(`<div class="month-cell monday">
        <div class="m-date">${d}</div>
        <div style="font-size: 10px; color: var(--text-mute);">公休</div>
      </div>`);
      continue;
    }

    const counts = [];
    if (day.early8?.length) counts.push(`<span class="m-count-pill early">早 ${day.early8.length}</span>`);
    if (day.noon8?.length) counts.push(`<span class="m-count-pill noon">午 ${day.noon8.length}</span>`);
    if (day.late75?.length) counts.push(`<span class="m-count-pill late">晚 ${day.late75.length}</span>`);
    if (day.support?.length) counts.push(`<span class="m-count-pill support">支 ${day.support.length}</span>`);

    const offText = day.off && day.off.length ? `休：${day.off.join('、')}` : '';

    const cls = ['month-cell'];
    if (day.holiday) cls.push('holiday');
    if (day.type === 'long') cls.push('long-day');

    cells.push(`<div class="${cls.join(' ')}" data-date="${dateStr}">
      <div class="m-date">${d} <span style="font-weight: normal; color: var(--text-soft); font-size: 11px;">週${day.wd}</span></div>
      ${day.holiday ? `<div class="m-holiday">🎉 ${day.holiday}</div>` : ''}
      ${day.event ? `<div class="m-event">📌 ${day.event}</div>` : ''}
      <div class="m-counts">${counts.join('')}</div>
      ${offText ? `<div class="m-off">${offText}</div>` : ''}
    </div>`);
  }

  grid.innerHTML = heads + cells.join('');

  // Click a cell → jump to day view
  grid.querySelectorAll('.month-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      const date = cell.dataset.date;
      currentDateIdx = dates.indexOf(date);
      setStoreMode('day');
      renderStoreView(date);
    });
  });
}

// ============ Hash routing ============
const VALID_TABS = ['employee', 'store', 'cowork', 'summary'];

function parseHash() {
  const h = window.location.hash.replace(/^#\/?/, '');
  if (!h) return { tab: 'employee', param: null };
  const [tab, ...rest] = h.split('/');
  return {
    tab: VALID_TABS.includes(tab) ? tab : 'employee',
    param: rest.length ? decodeURIComponent(rest.join('/')) : null,
  };
}

function setRoute(tab, param) {
  let h = `#/${tab}`;
  if (param) h += `/${encodeURIComponent(param)}`;
  if (window.location.hash === h) {
    applyRoute();  // ensure DOM matches (e.g. re-scroll to same date)
    return;
  }
  window.location.hash = h;
}

function applyRoute() {
  const { tab, param } = parseHash();

  // Switch tab
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === `view-${tab}`));

  if (tab === 'employee' && param) {
    if (EMPLOYEES.find(e => e.name === param) && currentEmployeeName !== param) {
      currentEmployeeName = param;
      updateEmpTrigger();
      renderEmployeeView(currentEmployeeName);
    }
  } else if (tab === 'store' && param && SCHEDULE[param]) {
    setTimeout(() => scrollToDate(param, true), 120);
  }
}

window.addEventListener('hashchange', applyRoute);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const newTab = tab.dataset.tab;
    setRoute(newTab, newTab === 'employee' ? currentEmployeeName : null);
  });
});

document.getElementById('jump-date').addEventListener('change', (e) => {

});

});

function jumpToEmployee(name) {
  const exists = EMPLOYEES.find(e => e.name === name);
  if (!exists) {
    alert(`找不到 ${name} 的員工資料（可能尚未加入系統）`);
    return;
  }
  // Reset filter to "all" so user sees full context
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === 'all'));
  setRoute('employee', name);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
