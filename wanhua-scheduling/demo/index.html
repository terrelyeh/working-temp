<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排班系統 Demo · 2026 年 4 月</title>
<style>
  :root {
    --text: #2C3345;
    --text-soft: #6B7280;
    --text-mute: #9CA3AF;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E5E7EB;
    --border-soft: #F3F4F6;
    --accent: #2563EB;
    --accent-soft: #EFF6FF;
    --early-bg: #DBEAFE;
    --early-fg: #1E40AF;
    --early-border: #60A5FA;
    --noon-bg: #D1FAE5;
    --noon-fg: #065F46;
    --noon-border: #34D399;
    --late-bg: #EDE9FE;
    --late-fg: #5B21B6;
    --late-border: #A78BFA;
    --support-bg: #FEF3C7;
    --support-fg: #92400E;
    --support-border: #FBBF24;
    --off-bg: #F3F4F6;
    --off-fg: #6B7280;
    --holiday-bg: #FEE2E2;
    --holiday-fg: #991B1B;
    --event-bg: #FFEDD5;
    --event-fg: #9A3412;
  }
  * { box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    line-height: 1.7;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

  header { margin-bottom: 28px; }
  h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.02em; }
  .subtitle { color: var(--text-soft); font-size: 15px; margin: 0; }
  .disclaimer {
    display: inline-block; background: var(--accent-soft);
    color: var(--accent); padding: 4px 12px; border-radius: 999px;
    font-size: 13px; margin-top: 12px; font-weight: 500;
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 8px;
    background: var(--card); padding: 6px; border-radius: 12px;
    margin: 24px 0 20px; border: 1px solid var(--border);
    max-width: fit-content;
  }
  .tab {
    background: transparent; border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 15px; font-weight: 500;
    color: var(--text-soft); cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--text); color: white;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* Employee selector */
  .emp-selector {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  }
  .emp-selector label { font-size: 13px; color: var(--text-soft); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .emp-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .emp-pill {
    background: var(--border-soft); border: 1px solid transparent;
    padding: 6px 14px; border-radius: 20px; font-size: 14px;
    cursor: pointer; transition: all 0.15s;
    font-family: inherit; color: var(--text);
  }
  .emp-pill:hover { border-color: var(--accent); }
  .emp-pill.active {
    background: var(--text); color: white; border-color: var(--text);
  }
  .emp-filter { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
  .filter-check { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-soft); cursor: pointer; user-select: none; }
  .filter-check input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
  .filter-check:hover { color: var(--text); }

  /* Employee view: stats card */
  .emp-stats {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 24px; align-items: baseline;
  }
  .emp-name { font-size: 22px; font-weight: 600; }
  .emp-role { font-size: 13px; color: var(--text-soft); padding: 2px 10px; background: var(--border-soft); border-radius: 4px; }
  .emp-hours {
    margin-left: auto; display: flex; gap: 20px; font-size: 14px;
  }
  .hour-stat { text-align: right; }
  .hour-stat .label { color: var(--text-soft); font-size: 12px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
  .hour-stat .value { font-size: 18px; font-weight: 600; }
  .progress {
    width: 100%; height: 6px; background: var(--border-soft);
    border-radius: 3px; overflow: hidden; margin-top: 12px; flex-basis: 100%;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; }

  /* Day list (employee view) */
  .day-list { display: flex; flex-direction: column; gap: 8px; }
  .day-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: grid; grid-template-columns: 90px 1fr; gap: 16px; align-items: center;
  }
  .day-row.holiday { background: linear-gradient(90deg, var(--holiday-bg) 0%, var(--card) 30%); border-color: var(--holiday-fg); }
  .day-row.off { background: var(--off-bg); opacity: 0.85; }
  .day-row.monday { background: #FAFAF8; opacity: 0.6; }
  .day-date {
    display: flex; flex-direction: column;
  }
  .day-date .md { font-size: 18px; font-weight: 600; }
  .day-date .wd { font-size: 12px; color: var(--text-soft); }
  .day-shift-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 500;
  }
  .day-shift-pill.early { background: var(--early-bg); color: var(--early-fg); }
  .day-shift-pill.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .day-shift-pill.late { background: var(--late-bg); color: var(--late-fg); }
  .day-shift-pill.support { background: var(--support-bg); color: var(--support-fg); }
  .day-shift-pill.off { background: var(--off-bg); color: var(--off-fg); }
  .day-shift-pill.holiday { background: var(--holiday-bg); color: var(--holiday-fg); }
  .day-notes {
    margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .note-pill {
    font-size: 12px; padding: 2px 8px; border-radius: 4px;
    background: var(--event-bg); color: var(--event-fg);
  }

  /* Store view: day cards */
  .day-nav {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  }
  .day-nav button {
    background: var(--border-soft); border: none; border-radius: 6px;
    width: 36px; height: 36px; cursor: pointer; font-size: 18px;
    font-family: inherit; color: var(--text);
  }
  .day-nav button:hover { background: var(--border); }
  .day-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .day-nav .current-date {
    flex: 1; text-align: center;
    font-size: 18px; font-weight: 600;
  }
  .day-nav .current-date small { display: block; font-size: 13px; color: var(--text-soft); font-weight: normal; }
  .day-nav input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-family: inherit; font-size: 14px; color: var(--text);
  }

  .day-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px 28px;
    margin-bottom: 12px;
  }
  .day-card.holiday { border-top: 4px solid var(--holiday-fg); }
  .day-card.long-day { border-top: 4px solid var(--support-border); }
  .day-card.monday { background: #F9FAFB; text-align: center; color: var(--text-soft); padding: 40px; }
  .day-card h2 {
    margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  .day-card .wd { font-size: 14px; color: var(--text-soft); font-weight: normal; }
  .day-card .holiday-tag {
    background: var(--holiday-bg); color: var(--holiday-fg);
    padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 500;
  }
  .day-card .event-tag {
    background: var(--event-bg); color: var(--event-fg);
    padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 500;
  }

  /* Timeline (day detail view) */
  .timeline { margin-top: 20px; }
  .tl-row {
    display: grid; grid-template-columns: 70px 6px 1fr;
    gap: 14px; align-items: stretch;
    position: relative;
  }
  .tl-time {
    font-size: 14px; font-weight: 600; color: var(--text);
    text-align: right; font-variant-numeric: tabular-nums;
    padding: 12px 0 8px; line-height: 1.3;
  }
  .tl-time .tl-end { display: block; font-size: 11px; color: var(--text-mute); font-weight: 400; }
  .tl-bar {
    background: var(--border-soft);
    border-radius: 3px; align-self: stretch;
    position: relative;
  }
  .tl-bar::before {
    content: ''; position: absolute; top: 16px; left: -3px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--text-mute); border: 2px solid var(--bg);
  }
  .tl-bar.early { background: var(--early-border); }
  .tl-bar.early::before { background: var(--early-fg); }
  .tl-bar.noon { background: var(--noon-border); }
  .tl-bar.noon::before { background: var(--noon-fg); }
  .tl-bar.late { background: var(--late-border); }
  .tl-bar.late::before { background: var(--late-fg); }
  .tl-bar.support { background: var(--support-border); }
  .tl-bar.support::before { background: var(--support-fg); }
  .tl-bar.note { background: var(--event-fg); opacity: 0.4; }
  .tl-bar.note::before { background: var(--event-fg); }
  .tl-content { padding: 8px 0 16px; }
  .tl-shift-head {
    display: flex; justify-content: space-between;
    padding: 10px 14px; border-radius: 8px;
    margin-bottom: 8px; align-items: baseline; flex-wrap: wrap; gap: 8px;
    font-weight: 600;
  }
  .tl-shift-head.early { background: var(--early-bg); color: var(--early-fg); }
  .tl-shift-head.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .tl-shift-head.late { background: var(--late-bg); color: var(--late-fg); }
  .tl-shift-head.support { background: var(--support-bg); color: var(--support-fg); }
  .tl-shift-head .count { font-size: 13px; font-weight: 500; opacity: 0.75; }
  .tl-note-card {
    background: var(--event-bg); color: var(--event-fg);
    padding: 10px 14px; border-radius: 8px;
    display: flex; gap: 8px; align-items: center; font-size: 14px;
  }
  .tl-note-card .tag {
    background: var(--event-fg); color: white;
    padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
  }
  .tl-untimed-group {
    margin-top: 12px; padding: 12px 16px;
    background: #F9FAFB; border-radius: 8px;
    border: 1px dashed var(--border);
  }
  .tl-untimed-group h4 {
    margin: 0 0 8px; font-size: 13px; color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .tl-untimed-group .items { display: flex; flex-direction: column; gap: 6px; }
  .tl-untimed-group .tl-note-card { margin: 0; }

  .shift-block {
    margin-top: 16px; padding: 14px 16px; border-radius: 10px;
    border-left: 4px solid;
  }
  .shift-block.early { background: var(--early-bg); border-color: var(--early-border); }
  .shift-block.noon { background: var(--noon-bg); border-color: var(--noon-border); }
  .shift-block.late { background: var(--late-bg); border-color: var(--late-border); }
  .shift-block.support { background: var(--support-bg); border-color: var(--support-border); }
  .shift-block h3 {
    margin: 0 0 8px; font-size: 15px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .shift-block .count { font-size: 13px; color: var(--text-soft); font-weight: 500; }
  .shift-block .people {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .person-chip {
    background: white; padding: 8px 16px; border-radius: 8px;
    font-size: 17px; font-weight: 600; color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .person-chip.fulltime { font-weight: 700; }
  .person-chip.fulltime::before { content: "★ "; color: #F59E0B; font-size: 15px; }
  .tl-content .people { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }

  .off-section {
    margin-top: 16px; padding-top: 14px;
    border-top: 1px dashed var(--border);
    display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap;
  }
  .off-section .label { color: var(--text-soft); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
  .off-chip {
    background: var(--off-bg); color: var(--off-fg);
    padding: 3px 10px; border-radius: 4px; font-size: 13px;
  }

  .events-section {
    margin-top: 12px; display: flex; flex-direction: column; gap: 6px;
  }
  .event-row {
    font-size: 14px; color: var(--text-soft);
    display: flex; gap: 10px; align-items: baseline;
  }
  .event-row .time { color: var(--text); font-weight: 500; min-width: 50px; }
  .event-row .tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; background: var(--event-bg); color: var(--event-fg); }

  /* Month summary */
  .summary-table {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; border-collapse: collapse; font-size: 14px;
  }
  .summary-table th, .summary-table td {
    text-align: left; padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft);
  }
  .summary-table th {
    background: #F9FAFB; font-weight: 600; font-size: 13px;
    color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.03em;
  }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table .role-tag {
    font-size: 11px; padding: 1px 6px; border-radius: 3px;
  }
  .role-tag.fulltime { background: #FEF3C7; color: #92400E; }
  .role-tag.pt { background: #DBEAFE; color: #1E40AF; }
  .role-tag.admin { background: #FCE7F3; color: #9F1239; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;
    font-size: 13px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px;
  }
  .legend-item.early { background: var(--early-bg); color: var(--early-fg); }
  .legend-item.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .legend-item.late { background: var(--late-bg); color: var(--late-fg); }
  .legend-item.support { background: var(--support-bg); color: var(--support-fg); }
  .legend-item.off { background: var(--off-bg); color: var(--off-fg); }

  /* Store toolbar (sticky) */
  .store-toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 12px 0;
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .toolbar-left { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .toolbar-hint { color: var(--text-soft); font-size: 13px; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .toolbar-right input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-family: inherit; font-size: 14px; color: var(--text);
  }

  #all-days { display: flex; flex-direction: column; gap: 12px; }
  #all-days .day-card { scroll-margin-top: 80px; }
  #all-days .day-card.highlight {
    box-shadow: 0 0 0 3px var(--accent); animation: highlight 1.5s ease-out;
  }
  @keyframes highlight { from { box-shadow: 0 0 0 4px var(--accent); } to { box-shadow: 0 1px 2px rgba(0,0,0,0.04); } }

  /* Week view */
  .week-nav {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  }
  .week-nav button {
    background: var(--border-soft); border: none; border-radius: 6px;
    padding: 8px 14px; cursor: pointer; font-size: 14px;
    font-family: inherit; color: var(--text);
  }
  .week-nav button:hover { background: var(--border); }
  .week-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .week-nav .current-week { flex: 1; text-align: center; font-size: 16px; font-weight: 600; }

  .week-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .week-day {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 10px;
    display: flex; flex-direction: column; min-height: 260px;
  }
  .week-day.monday { background: #F9FAFB; opacity: 0.7; }
  .week-day.holiday { border-top: 3px solid var(--holiday-fg); }
  .week-day.long-day { background: linear-gradient(180deg, #FFFBEB 0%, var(--card) 40%); }
  .week-day.out-of-month {
    background: repeating-linear-gradient(45deg, #F9FAFB, #F9FAFB 10px, #F3F4F6 10px, #F3F4F6 20px);
    opacity: 0.6; cursor: not-allowed;
  }
  .week-day.out-of-month .wd-head, .week-day.out-of-month .wd-date { color: var(--text-mute); }
  .week-day .wd-head {
    font-size: 13px; color: var(--text-soft); font-weight: 500; margin-bottom: 2px;
  }
  .week-day .wd-date { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .week-day .wd-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--holiday-bg); color: var(--holiday-fg);
    margin-bottom: 6px; display: inline-block; width: fit-content;
  }
  .week-day .wd-event {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--event-bg); color: var(--event-fg);
    margin-bottom: 6px; display: inline-block; width: fit-content;
  }
  .week-shift {
    font-size: 11px; padding: 4px 6px; border-radius: 4px;
    margin-bottom: 4px;
  }
  .week-shift.early { background: var(--early-bg); color: var(--early-fg); }
  .week-shift.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .week-shift.late { background: var(--late-bg); color: var(--late-fg); }
  .week-shift.support { background: var(--support-bg); color: var(--support-fg); }
  .week-shift .shift-label { font-weight: 600; font-size: 11px; display: block; margin-bottom: 3px; }
  .week-shift .shift-time { font-weight: 500; opacity: 0.75; font-size: 10px; margin-left: 2px; font-variant-numeric: tabular-nums; }
  .week-shift .shift-names { line-height: 1.4; }
  .week-shift .star { color: #F59E0B; }
  .week-day .wd-off {
    margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--border);
    font-size: 10px; color: var(--text-soft);
  }
  .week-day.monday-closed {
    align-items: center; justify-content: center;
    color: var(--text-soft); font-size: 13px; text-align: center;
  }

  /* Month view */
  .month-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .shift-legend {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    font-size: 12px; font-variant-numeric: tabular-nums;
  }
  .legend-pill {
    padding: 3px 10px; border-radius: 4px; font-weight: 500;
  }
  .legend-pill.early { background: var(--early-bg); color: var(--early-fg); }
  .legend-pill.noon { background: var(--noon-bg); color: var(--noon-fg); }
  .legend-pill.late { background: var(--late-bg); color: var(--late-fg); }
  .legend-pill.support { background: var(--support-bg); color: var(--support-fg); }
  .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .month-head-cell {
    font-size: 12px; color: var(--text-soft); text-align: center;
    padding: 6px 0; font-weight: 600; letter-spacing: 0.05em;
  }
  .month-cell {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; min-height: 90px;
    cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; gap: 3px;
  }
  .month-cell:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(37,99,235,0.1); }
  .month-cell.empty { background: transparent; border: none; cursor: default; }
  .month-cell.empty:hover { box-shadow: none; }
  .month-cell.monday { background: #F9FAFB; opacity: 0.6; cursor: default; }
  .month-cell.monday:hover { box-shadow: none; border-color: var(--border); }
  .month-cell.holiday { border-top: 3px solid var(--holiday-fg); }
  .month-cell.long-day { background: linear-gradient(180deg, #FFFBEB 0%, var(--card) 40%); }
  .month-cell.out-of-month {
    background: repeating-linear-gradient(45deg, #F9FAFB, #F9FAFB 8px, #F3F4F6 8px, #F3F4F6 16px);
    opacity: 0.5; cursor: default;
  }
  .month-cell.out-of-month:hover { box-shadow: none; border-color: var(--border); }
  .month-cell.out-of-month .m-date { color: var(--text-mute); }
  .month-cell .m-date { font-size: 14px; font-weight: 600; }

function isFullTime(name) {
  const emp = EMPLOYEES.find(e => e.name === name);
  return emp && emp.role === 'fulltime';
}

function findShiftsForEmployee(name) {
  const result = [];
  for (const [date, day] of Object.entries(SCHEDULE)) {
    if (day.type === 'monday') {
      result.push({ date, day, status: 'monday' });
      continue;
    }
    if (day.off && day.off.includes(name)) {
      result.push({ date, day, status: 'off' });
      continue;
    }
    const shifts = [];
    for (const k of ['early8', 'noon8', 'late75', 'support']) {
      if (day[k] && day[k].includes(name)) shifts.push(k);
    }
    if (shifts.length) {
      result.push({ date, day, status: 'work', shifts });
    } else {
      result.push({ date, day, status: 'rest' });
    }
  }
  return result;
}

function renderEmployeeView(name) {
  const emp = EMPLOYEES.find(e => e.name === name);
  const stats = document.getElementById('emp-stats');
  const roleLabel = emp.role === 'fulltime' ? '正職' : emp.role === 'admin' ? '主管' : 'PT';

  if (emp.target) {
    const totalDelivered = emp.actual + emp.leave + emp.meeting;
    const pct = Math.round(totalDelivered / emp.target * 100);
    stats.innerHTML = `
      <div class="emp-name">${emp.name}</div>
      <span class="emp-role">${roleLabel}</span>
      <div class="emp-hours">
        <div class="hour-stat"><span class="label">目標</span><span class="value">${emp.target}h</span></div>
        <div class="hour-stat"><span class="label">實排</span><span class="value">${emp.actual}h</span></div>
        <div class="hour-stat"><span class="label">特休</span><span class="value">${emp.leave}h</span></div>
        <div class="hour-stat"><span class="label">會議</span><span class="value">${emp.meeting}h</span></div>
        <div class="hour-stat"><span class="label">達成</span><span class="value" style="color: ${pct >= 95 ? '#166534' : '#B45309'}">${pct}%</span></div>
      </div>
      <div class="progress"><div class="progress-fill" style="width: ${Math.min(100, pct)}%"></div></div>
    `;
  } else {
    stats.innerHTML = `
      <div class="emp-name">${emp.name}</div>
      <span class="emp-role">${roleLabel}</span>
      <div style="color: var(--text-soft); margin-left: auto;">主管（支援管理為主，不列入工時統計）</div>
    `;
  }

  const list = document.getElementById('emp-day-list');
  const onlyScheduled = document.getElementById('only-scheduled').checked;
  let days = findShiftsForEmployee(name);
  if (onlyScheduled) days = days.filter(d => d.status === 'work');
  if (!days.length) { list.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-soft);">此員工本月無排班</div>`; return; }
  list.innerHTML = days.map(({ date, day, status, shifts }) => {
    const d = new Date(date);
    const mdFmt = `${d.getMonth() + 1}/${d.getDate()}`;
    const cls = ['day-row'];
    if (status === 'monday') cls.push('monday');
    if (status === 'off') cls.push('off');
    if (day.holiday) cls.push('holiday');

    let pill = '';
    if (status === 'monday') pill = '<span class="day-shift-pill off">週一公休</span>';
    else if (status === 'off') pill = '<span class="day-shift-pill off">休</span>';
    else if (status === 'rest') pill = '<span class="day-shift-pill off" style="background: transparent; color: var(--text-mute);">未排班</span>';
    else pill = shifts.map(s => `<span class="day-shift-pill ${SHIFT_INFO[s].key}">${SHIFT_INFO[s].label}</span>`).join(' ');

    const events = [];
    if (day.holiday) events.push(`<span class="note-pill">${day.holiday}</span>`);
    if (day.event) events.push(`<span class="note-pill">${day.event}</span>`);
    if (day.notes) day.notes.forEach(n => events.push(`<span class="note-pill">${n.tag || ''} ${n.text}</span>`));

    return `
      <div class="${cls.join(' ')}">
        <div class="day-date">
          <span class="md">${mdFmt}</span>
          <span class="wd">週${day.wd}</span>
        </div>
        <div>
          ${pill}
          ${events.length ? `<div class="day-notes">${events.join('')}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function buildDayCardHtml(date) {
  const day = SCHEDULE[date];
  if (!day) return '';
  const d = new Date(date);
  const mdFmt = `${d.getMonth() + 1} 月 ${d.getDate()} 日`;

  if (day.type === 'monday') {
    return `
      <div class="day-card monday" id="card-${date}">
        <h2 style="justify-content: center;">${mdFmt} 週${day.wd}</h2>
        <p>週一公休 · 全體休假</p>
      </div>
    `;
  }

  const tags = [];
  if (day.holiday) tags.push(`<span class="holiday-tag">🎉 ${day.holiday}</span>`);
  if (day.event) tags.push(`<span class="event-tag">📌 ${day.event}</span>`);

  // === Build timeline events ===
  const timelineEvents = [];
  const shiftTimes = {
    early10: { start: '09:00', end: '19:00' },
    early8:  { start: '09:00', end: '17:00' },
    noon8:   { start: '11:00', end: '19:00' },
    support: { start: '17:00', end: '19:00' },
    late75:  { start: '17:00', end: '次日 00:30' },
  };
  for (const key of ['early10','early8','noon8','support','late75']) {
    if (day[key] && day[key].length) {
      timelineEvents.push({ sort: shiftTimes[key].start, type: 'shift', key, start: shiftTimes[key].start, end: shiftTimes[key].end, people: day[key] });
    }
  }
  const untimed = [];
  if (day.notes) {
    day.notes.forEach(n => {
      const t = n.time;
      const isTimed = t && /^\d{1,2}:\d{2}$/.test(t);
      if (isTimed) {
        timelineEvents.push({ sort: t, type: 'note', time: t, tag: n.tag, text: n.text });
      } else {
        untimed.push({ time: t, tag: n.tag, text: n.text });
      }
    });
  }
  timelineEvents.sort((a, b) => a.sort.localeCompare(b.sort));

  const timelineHtml = timelineEvents.map(ev => {
    if (ev.type === 'shift') {
      const info = SHIFT_INFO[ev.key];
      const peopleHtml = ev.people.map(n => `<span class="person-chip ${isFullTime(n) ? 'fulltime' : ''}">${n}</span>`).join('');
      return `
        <div class="tl-row">
          <div class="tl-time">${ev.start}<span class="tl-end">至 ${ev.end}</span></div>
          <div class="tl-bar ${info.key}"></div>
          <div class="tl-content">
            <div class="tl-shift-head ${info.key}">
              <span>${info.label}</span>
              <span class="count">${ev.people.length} 人 · ${info.hours}h</span>
            </div>
            <div class="people">${peopleHtml}</div>
          </div>
        </div>`;
    } else {
      return `
        <div class="tl-row">
          <div class="tl-time">${ev.time}</div>
          <div class="tl-bar note"></div>
          <div class="tl-content">
            <div class="tl-note-card">
              ${ev.tag ? `<span class="tag">${ev.tag}</span>` : '📝'}
              <span>${ev.text}</span>
            </div>
          </div>
        </div>`;
    }
  }).join('');

  const untimedHtml = untimed.length ? `
    <div class="tl-untimed-group">
      <h4>當日事項（無固定時間）</h4>
      <div class="items">
        ${untimed.map(n => `
          <div class="tl-note-card">
            ${n.tag ? `<span class="tag">${n.tag}</span>` : '📝'}
            <span>${n.text}</span>
            ${n.time && n.time !== '—' ? `<span style="margin-left: auto; font-size: 12px; opacity: 0.8;">${n.time}</span>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  const offHtml = day.off && day.off.length ? `
    <div class="off-section">
      <span class="label">休</span>
      ${day.off.map(n => `<span class="off-chip">${n}</span>`).join('')}
    </div>
  ` : '';

  return `
    <div class="day-card ${day.holiday ? 'holiday' : ''} ${day.type === 'long' ? 'long-day' : ''}" id="card-${date}">
      <h2>${mdFmt} <span class="wd">週${day.wd}</span> ${tags.join(' ')}</h2>
      <div class="timeline">${timelineHtml}</div>
      ${untimedHtml}
      ${offHtml}
    </div>
  `;
}

function renderAllDays() {
  const container = document.getElementById('all-days');
  const allDates = Object.keys(SCHEDULE).sort();
  container.innerHTML = allDates.map(buildDayCardHtml).join('');
}

function renderSummary() {
  const tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = EMPLOYEES
    .filter(e => e.role !== 'admin' || e.name === 'Winnie')
    .map(e => {
      if (!e.target) {
        return `
          <tr>
            <td><strong>${e.name}</strong></td>
            <td><span class="role-tag admin">主管</span></td>
            <td colspan="5" style="color: var(--text-soft); text-align: center;">支援管理為主，不列入工時統計</td>
          </tr>
        `;
      }
      const delivered = e.actual + e.leave + e.meeting;
      const pct = Math.round(delivered / e.target * 100);
      const roleLabel = e.role === 'fulltime' ? '正職' : 'PT';
      return `
        <tr>
          <td><strong>${e.name}</strong></td>
          <td><span class="role-tag ${e.role}">${roleLabel}</span></td>
          <td style="text-align: right;">${e.target}h</td>
          <td style="text-align: right;">${e.actual}h</td>
          <td style="text-align: right;">${e.leave || '—'}</td>
          <td style="text-align: right;">${e.meeting || '—'}</td>
          <td style="text-align: right; color: ${pct >= 95 ? '#166534' : '#B45309'}; font-weight: 600;">${pct}%</td>
        </tr>
      `;
    }).join('');
}

// ============ Week View ============
// Week = Monday ~ Sunday. April 2026 weeks:
// Wk1: 3/30-4/5 (公休-四-五-六-日)... let's start April from its natural weeks
const WEEKS = [
  { label: '第 1 週', start: '2026-03-30', days: ['2026-03-30','2026-03-31','2026-04-01','2026-04-02','2026-04-03','2026-04-04','2026-04-05'] },
  { label: '第 2 週', start: '2026-04-06', days: ['2026-04-06','2026-04-07','2026-04-08','2026-04-09','2026-04-10','2026-04-11','2026-04-12'] },
  { label: '第 3 週', start: '2026-04-13', days: ['2026-04-13','2026-04-14','2026-04-15','2026-04-16','2026-04-17','2026-04-18','2026-04-19'] },
  { label: '第 4 週', start: '2026-04-20', days: ['2026-04-20','2026-04-21','2026-04-22','2026-04-23','2026-04-24','2026-04-25','2026-04-26'] },
  { label: '第 5 週', start: '2026-04-27', days: ['2026-04-27','2026-04-28','2026-04-29','2026-04-30','2026-05-01','2026-05-02','2026-05-03'] },
];
let currentWeekIdx = 1; // default to 第 2 週 (4/6–4/12)

function renderWeekView() {
  const week = WEEKS[currentWeekIdx];
  const first = week.days[0], last = week.days[6];
  const fmt = d => { const x = new Date(d); return `${x.getMonth()+1}/${x.getDate()}`; };
  document.getElementById('current-week').textContent = `${week.label} · ${fmt(first)} – ${fmt(last)}`;
  document.getElementById('prev-week').disabled = currentWeekIdx === 0;
  document.getElementById('next-week').disabled = currentWeekIdx === WEEKS.length - 1;

  const grid = document.getElementById('week-grid');
  const WD_NAMES = ['一','二','三','四','五','六','日'];

  grid.innerHTML = week.days.map((date, i) => {
    const day = SCHEDULE[date];
    const d = new Date(date);
    const mdFmt = `${d.getMonth()+1}/${d.getDate()}`;

    if (!day) {
      return `<div class="week-day out-of-month">
        <div class="wd-head">週${WD_NAMES[i]}</div>
        <div class="wd-date">${mdFmt}</div>
        <div style="color: var(--text-mute); font-size: 11px;">非四月</div>
      </div>`;
    }

    if (day.type === 'monday') {
      return `<div class="week-day monday monday-closed">
        <div class="wd-head">週${day.wd}</div>
        <div class="wd-date">${mdFmt}</div>
        <div>公休</div>
      </div>`;
    }

    const shiftHtml = (key) => {
      const list = day[key];
      if (!list || !list.length) return '';
      const info = SHIFT_INFO[key];
      const names = list.map(n => isFullTime(n) ? `<span class="star">★</span>${n}` : n).join('、');
      const [shiftName, shiftTime] = info.label.split(' ');
      return `<div class="week-shift ${info.key}">
        <span class="shift-label">${shiftName} <span class="shift-time">${shiftTime}</span></span>
        <span class="shift-names">${names}</span>
      </div>`;
    };

    const cls = ['week-day'];
    if (day.holiday) cls.push('holiday');
    if (day.type === 'long') cls.push('long-day');

    return `<div class="${cls.join(' ')}">
      <div class="wd-head">週${day.wd}</div>
      <div class="wd-date">${mdFmt}</div>
      ${day.holiday ? `<span class="wd-tag">🎉 ${day.holiday}</span>` : ''}
      ${day.event ? `<span class="wd-event">📌 ${day.event}</span>` : ''}
      ${shiftHtml('early8')}
      ${shiftHtml('noon8')}
      ${shiftHtml('late75')}
      ${shiftHtml('support')}
      ${day.off && day.off.length ? `<div class="wd-off">休：${day.off.join('、')}</div>` : ''}
    </div>`;
  }).join('');
}

// ============ Month View ============
function renderMonthView() {
  const grid = document.getElementById('month-grid');
  // Header row
  const heads = ['週一','週二','週三','週四','週五','週六','週日']
    .map(w => `<div class="month-head-cell">${w}</div>`).join('');

  // April 2026: 4/1 is 週三. So first row: Mon=空, Tue=空, Wed=4/1 ...
  const cells = [];
  // 2 empty cells (Mon, Tue of pre-April)
  cells.push(`<div class="month-cell empty"></div>`);
  cells.push(`<div class="month-cell empty"></div>`);

  for (let d = 1; d <= 30; d++) {
    const dateStr = `2026-04-${String(d).padStart(2,'0')}`;
    const day = SCHEDULE[dateStr];
    if (!day) { cells.push(`<div class="month-cell empty"></div>`); continue; }

    if (day.type === 'monday') {
      cells.push(`<div class="month-cell monday">
        <div class="m-date">${d}</div>
        <div style="font-size: 10px; color: var(--text-mute);">公休</div>
      </div>`);
      continue;
    }

    const counts = [];
    if (day.early8?.length) counts.push(`<span class="m-count-pill early">早 ${day.early8.length}</span>`);
    if (day.noon8?.length) counts.push(`<span class="m-count-pill noon">午 ${day.noon8.length}</span>`);
    if (day.late75?.length) counts.push(`<span class="m-count-pill late">晚 ${day.late75.length}</span>`);
    if (day.support?.length) counts.push(`<span class="m-count-pill support">支 ${day.support.length}</span>`);

    const offText = day.off && day.off.length ? `休：${day.off.join('、')}` : '';

    const cls = ['month-cell'];
    if (day.holiday) cls.push('holiday');
    if (day.type === 'long') cls.push('long-day');

    cells.push(`<div class="${cls.join(' ')}" data-date="${dateStr}">
      <div class="m-date">${d} <span style="font-weight: normal; color: var(--text-soft); font-size: 11px;">週${day.wd}</span></div>
      ${day.holiday ? `<div class="m-holiday">🎉 ${day.holiday}</div>` : ''}
      ${day.event ? `<div class="m-event">📌 ${day.event}</div>` : ''}
      <div class="m-counts">${counts.join('')}</div>
      ${offText ? `<div class="m-off">${offText}</div>` : ''}
    </div>`);
  }

  grid.innerHTML = heads + cells.join('');

  // Click a cell → jump to day view
  grid.querySelectorAll('.month-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      const date = cell.dataset.date;
      currentDateIdx = dates.indexOf(date);
      setStoreMode('day');
      renderStoreView(date);
    });
  });
}

function setStoreMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.querySelectorAll('.store-mode-panel').forEach(p => {
    p.style.display = p.id === `store-mode-${mode}` ? '' : 'none';
  });
}

// ============ Events ============
document.getElementById('only-scheduled').addEventListener('change', () => {
  const active = document.querySelector('.emp-pill.active');
  if (active) renderEmployeeView(active.dataset.name);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${tab.dataset.tab}`).classList.add('active');
  });
});

document.getElementById('jump-date').addEventListener('change', (e) => {
  const target = document.getElementById(`card-${e.target.value}`);
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    target.classList.add('highlight');
    setTimeout(() => target.classList.remove('highlight'), 1600);
  }
});

// Init
renderEmpPills();
renderEmployeeView('超威');
renderAllDays();
renderSummary();
</script>

</div>
</body>
